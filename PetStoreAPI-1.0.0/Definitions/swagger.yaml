openapi: 3.0.1
info:
  title: PetStoreAPI
  version: 1.0.0
servers:
 -
  url: /
security:
 -
  default: []
paths:
  /pet/findByStatus:
    get:
      tags:
       - pet
      summary: Finds Pets by status
      description: Multiple status values can be provided with comma separated strings
      operationId: findPetsByStatus
      parameters:
       -
        name: status
        in: query
        description: Status values that need to be considered for filter
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
           - available
           - pending
           - sold
          default: available
      responses:
        "200":
          description: successful operation
          content:
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        "400":
          description: Invalid status value
      security:
       -
        petstore_auth:
         - write:pets
         - read:pets
       -
        default:
         - write:pets
         - read:pets
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
  /pet/findByTags:
    get:
      tags:
       - pet
      summary: Finds Pets by tags
      description: Multiple tags can be provided with comma separated strings. Use tag1, tag2, tag3 for testing.
      operationId: findPetsByTags
      parameters:
       -
        name: tags
        in: query
        description: Tags to filter by
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        "400":
          description: Invalid tag value
      security:
       -
        petstore_auth:
         - write:pets
         - read:pets
       -
        default:
         - write:pets
         - read:pets
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
  /pet/{petId}:
    get:
      tags:
       - pet
      summary: Find pet by ID
      description: Returns a single pet
      operationId: getPetById
      parameters:
       -
        name: petId
        in: path
        description: ID of pet to return
        required: true
        style: simple
        explode: false
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        "400":
          description: Invalid ID supplied
        "404":
          description: Pet not found
      security:
       -
        api_key: []
       -
        petstore_auth:
         - write:pets
         - read:pets
       -
        default:
         - write:pets
         - read:pets
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Dogs
      xml:
        name: category
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
    Pet:
      required:
       - name
       - photoUrls
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie
        category:
          $ref: '#/components/schemas/Category'
        photoUrls:
          type: array
          xml:
            wrapped: true
          items:
            type: string
            xml:
              name: photoUrl
        tags:
          type: array
          xml:
            wrapped: true
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          description: pet status in the store
          enum:
           - available
           - pending
           - sold
      xml:
        name: pet
  securitySchemes:
    default:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://test.com
          scopes:
            read:pets: read your pets
            write:pets: modify pets in your account
          x-scopes-bindings:
            write:pets: ""
            read:pets: ""
